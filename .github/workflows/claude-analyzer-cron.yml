name: Claude Trade Analyzer (wekelijks)

on:
  schedule:
    - cron: '0 8 * * 1'  # Elke maandag om 08:00 UTC
  workflow_dispatch:       # Handmatig triggeren via GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Claude trade analyse
        run: |
          set -e
          HTTP=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "x-bot-token: ${{ secrets.PAPER_ENGINE_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PAPER_ENGINE_URL }}/api/claude-analyzer")
          echo "HTTP $HTTP"
          cat /tmp/resp.json
          if [ "$HTTP" != "200" ]; then exit 1; fi
